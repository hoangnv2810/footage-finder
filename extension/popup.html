<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Footage Finder Importer</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="app-header">
        <h1>Footage Finder</h1>
        <div class="header-actions">
          <button id="copy-prompt" type="button" class="icon-btn" title="Copy Prompt">📋 Prompt</button>
          <button id="pin-popup" type="button" class="icon-btn" title="Pop out (Pin)">📌 Pin</button>
        </div>
      </header>

      <section class="mode-section">
        <div class="mode-tabs">
          <button id="mode-auto-btn" type="button" class="mode-tab">Auto Extract</button>
          <button id="mode-manual-btn" type="button" class="mode-tab active">Manual Paste</button>
        </div>

        <div id="mode-auto-container" class="mode-container hidden">
          <button id="refresh" type="button">Extract from page</button>
        </div>

        <div id="mode-manual-container" class="mode-container">
          <textarea id="manual-textarea" placeholder="Right-click or Ctrl+V to auto-paste JSON..." rows="4"></textarea>
          <button id="toggle-preview-btn" type="button" class="btn-outline hidden">Show Preview</button>
        </div>
      </section>

      <section class="filename-section">
        <label for="filename-manual" class="filename-label">Target Video Filename</label>
        <div class="filename-wrapper">
          <div class="filename-input-group">
            <input
              id="filename-manual"
              type="text"
              class="filename-input"
              placeholder="e.g. video"
              autocomplete="off"
              spellcheck="false"
            />
            <button id="filename-clear" type="button" class="filename-clear hidden" title="Clear">&times;</button>
            <button id="video-preview-btn" type="button" class="filename-preview-btn hidden" title="Preview video">▶</button>
          </div>
          <div id="autocomplete-list" class="autocomplete-items hidden"></div>
        </div>
        <div id="video-preview-container" class="hidden">
          <video id="video-preview" controls></video>
        </div>
        <div id="response-selector-row" class="hidden" style="display: flex; flex-direction: column; gap: 6px; margin-top: 8px;">
          <label for="response-selector" style="font-size: 12px; color: #94a3b8;">Select Version</label>
          <select id="response-selector" class="response-select"></select>
        </div>
      </section>

      <section id="preview-section" class="hidden">
        <div class="preview-toolbar">
          <span class="label">Preview</span>
          <div class="preview-tabs">
            <button id="tab-scenes" type="button" class="tab-btn active">Scenes</button>
            <button id="tab-json" type="button" class="tab-btn">Raw JSON</button>
          </div>
        </div>

        <div id="preview-scenes" class="panel preview-panel">
          <div id="scene-list" class="scene-list"></div>
        </div>

        <div id="preview-json" class="panel preview-panel hidden">
          <pre id="json-raw" class="json-raw"></pre>
        </div>
      </section>

      <section class="actions">
        <button id="save" type="button" disabled>Save</button>
      </section>

      <section class="panel log-panel">
        <div class="log-header">
          <span class="label">Log</span>
          <button id="copy-log" type="button" class="copy-log-btn">Copy log</button>
        </div>
        <pre id="message" class="log-area">Open a chat.qwen.ai tab with a finished JSON response.</pre>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
